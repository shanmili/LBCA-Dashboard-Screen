<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var base = '/LBCA-Monitoring-System';
      var path = window.location.pathname.slice(base.length) || '/';
      var search = window.location.search;
      sessionStorage.setItem('redirect', path + search);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
